<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topological Evidence Gaps</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <header>
                <h1>TDA-Meta</h1>
                <p class="subtitle">Topological Evidence Gaps</p>
            </header>

            <div class="controls">
                <button id="btnCompute" class="btn-primary">Scan Topology</button>
            </div>

            <div class="metrics">
                <div class="metric-card">
                    <span class="label">Total Domains</span>
                    <span id="domainCount" class="value">--</span>
                </div>
                <div class="metric-card">
                    <span class="label">Extreme Voids</span>
                    <span id="voidCount" class="value">--</span>
                </div>
            </div>

            <footer class="sidebar-footer">
                <p>TruthCert: Persistent Homology (v2026)</p>
            </footer>
        </aside>

        <main class="main-content">
            <div class="chart-container">
                <canvas id="voidChart"></canvas>
            </div>
            <div id="gapDetails" class="gap-details">
                <!-- Details populated by JS -->
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
